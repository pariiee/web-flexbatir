server {
    listen 80;
    server_name flexbatir.web.id www.flexbatir.web.id;

    root /var/www/flexbatir/public;
    index index.php index.html;

    # Redirect www ke non-www
    if ($host = www.flexbatir.web.id) {
        return 301 https://flexbatir.web.id$request_uri;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Handle Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Block akses ke file sensitif
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }

    # Static assets caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2|woff|ttf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Max upload size
    client_max_body_size 20M;

    # Log
    access_log /var/log/nginx/flexbatir_access.log;
    error_log /var/log/nginx/flexbatir_error.log;
}
